<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Portail IPTV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; }
        /* Style des écrans de maintenance */
        .maintenance-screen { display: none; text-align: center; padding-top: 50px; }
        .maintenance-screen img { max-width: 600px; width: 100%; }
        
        /* Grille et Lecteur */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        #vue-lecteur { display: none; }
        video { width: 100%; background: black; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="maintenance-global" class="maintenance-screen"><img src="images/maintenance_site.png"></div>
    <div id="maintenance-lecteur" class="maintenance-screen"><img src="images/maintenance_lecteur.png"></div>
    <div id="maintenance-chaine" class="maintenance-screen"><img src="images/maintenance_chaine.png"></div>

    <div id="app-content">
        <h1>🌍 Catalogue IPTV</h1>
        <div id="app" class="grid"></div>
    </div>

    <div id="vue-lecteur">
        <button onclick="location.reload()">⬅ Retour</button>
        <video id="video" controls></video>
    </div>

    <script>
        // CONFIGURATION
        const config = {
            "GLOBAL": "OFF",
            "LECTEUR": "OFF"
        };

        const paysList = [{name: "France", code: "fr"}, {name: "Espagne", code: "es"}];

        function init() {
            if (config.GLOBAL === "OFF") {
                document.getElementById('maintenance-global').style.display = 'block';
                document.getElementById('app-content').style.display = 'none';
                return;
            }

            const app = document.getElementById('app');
            paysList.forEach(p => {
                const card = document.createElement('div');
                card.innerHTML = `<h3>${p.name}</h3><button onclick="chargerPays('${p.code}')">Ouvrir</button>`;
                app.appendChild(card);
            });
        }

        async function chargerPays(code) {
            if (config.LECTEUR === "OFF") {
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('maintenance-lecteur').style.display = 'block';
                return;
            }

            // Afficher le lecteur
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('vue-lecteur').style.display = 'block';

            // IMPORTANT : Utilisation du fichier M3U officiel
            const url = `https://iptv-org.github.io/iptv/countries/${code}.m3u`;
            alert("Chargement de la playlist : " + url);
            
            // Note: Pour lire réellement la vidéo, il faudra parser le fichier .m3u
            // et utiliser un proxy si le lien est en HTTP.
        }

        init();
    </script>
</body>
</html>
