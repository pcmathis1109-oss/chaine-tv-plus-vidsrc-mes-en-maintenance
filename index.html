<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hub de Streaming</title>
    <style>
        /* Styles de base */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #eee;
        }
        header {
            background-color: #222;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
        }
        nav button {
            margin-left: 10px;
            padding: 8px 15px;
            background-color: #444;
            border: none;
            border-radius: 4px;
            color: #eee;
            cursor: pointer;
        }
        nav button.active {
            background-color: #e50914;
        }
        main {
            padding: 20px;
        }
        .hidden {
            display: none;
        }
        .content-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .content-item {
            background-color: #222;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
            position: relative;
        }
        .content-item:hover {
            background-color: #333;
        }
        .content-item img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .content-item .status {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px;
            border-radius: 3px;
        }
        .content-item .status.up {
            background-color: rgba(0, 128, 0, 0.7);
        }
        .content-item .status.down {
            background-color: rgba(255, 0, 0, 0.7);
        }
        .content-item .status.maintenance {
            background-color: rgba(255, 165, 0, 0.7);
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .program-list {
            margin-top: 20px;
            background-color: #222;
            border-radius: 5px;
            padding: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1>Hub de Streaming</h1>
        <nav>
            <button id="btnMovies" class="active">Films</button>
            <button id="btnSeries">Séries</button>
            <button id="btnChannels">Chaînes TV</button>
        </nav>
    </header>
    <main>
        <section id="moviesSection">
            <h2>Films</h2>
            <div class="content-list" id="moviesList">
                <!-- Films chargés ici -->
            </div>
        </section>
        <section id="seriesSection" class="hidden">
            <h2>Séries</h2>
            <div class="content-list" id="seriesList">
                <!-- Séries chargées ici -->
            </div>
        </section>
        <section id="channelsSection" class="hidden">
            <h2>Chaînes TV</h2>
            <div class="content-list" id="channelsList">
                <!-- Chaînes chargées ici -->
            </div>
            <div class="program-list" id="programList">
                <!-- Programme TV affiché ici -->
            </div>
        </section>
    </main>

    <script>
        const btnMovies = document.getElementById('btnMovies');
        const btnSeries = document.getElementById('btnSeries');
        const btnChannels = document.getElementById('btnChannels');
        const moviesSection = document.getElementById('moviesSection');
        const seriesSection = document.getElementById('seriesSection');
        const channelsSection = document.getElementById('channelsSection');
        const moviesList = document.getElementById('moviesList');
        const seriesList = document.getElementById('seriesList');
        const channelsList = document.getElementById('channelsList');
        const programList = document.getElementById('programList');

        // Fonction pour basculer entre les sections
        function switchSection(activeBtn, activeSection) {
            const buttons = [btnMovies, btnSeries, btnChannels];
            const sections = [moviesSection, seriesSection, channelsSection];
            buttons.forEach(btn => btn.classList.remove('active'));
            sections.forEach(sec => sec.classList.add('hidden'));
            activeBtn.classList.add('active');
            activeSection.classList.remove('hidden');
        }

        // Événements de clic pour les boutons de navigation
        btnMovies.addEventListener('click', () => {
            switchSection(btnMovies, moviesSection);
            loadMovies();
        });
        btnSeries.addEventListener('click', () => {
            switchSection(btnSeries, seriesSection);
            loadSeries();
        });
        btnChannels.addEventListener('click', () => {
            switchSection(btnChannels, channelsSection);
            loadChannels();
        });

        // Fonction pour charger les films
        async function loadMovies() {
            moviesList.innerHTML = 'Chargement...';
            try {
                const response = await fetch('https://vidsrc-embed.ru/movies/latest/page-1.json');
                const data = await response.json();
                moviesList.innerHTML = '';
                data.forEach(movie => {
                    const div = document.createElement('div');
                    div.className = 'content-item';
                    div.innerHTML = `
                        <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
                        <div class="status up">En ligne</div>
                    `;
                    div.onclick = () => {
                        // Logique pour afficher le lecteur vidéo
                    };
                    moviesList.appendChild(div);
                });
            } catch (error) {
                moviesList.innerHTML = 'Erreur de chargement des films.';
                console.error(error);
            }
        }

        // Fonction pour charger les séries
        async function loadSeries() {
            seriesList.innerHTML = 'Chargement...';
            try {
                const response = await fetch('https://vidsrc-embed.ru/tvshows/latest/page-1.json');
                const data = await response.json();
                seriesList.innerHTML = '';
                data.forEach(series => {
                    const div = document.createElement('div');
                    div.className = 'content-item';
                    div.innerHTML = `
                        <img src="https://image.tmdb.org/t/p/w500${series.poster_path}" alt="${series.name}">
                        <div class="status up">En ligne</div>
                    `;
                    div.onclick = () => {
                        // Logique pour afficher le lecteur vidéo
                    };
                    seriesList.appendChild(div);
                });
            } catch (error) {
                seriesList.innerHTML = 'Erreur de chargement des séries.';
                console.error(error);
            }
        }

        // Fonction pour charger les chaînes TV
        async function loadChannels() {
            channelsList.innerHTML = 'Chargement...';
            try {
                const response = await fetch('https://iptv-org.github.io/api/channels.json');
                const channels = await response.json();
                channelsList.innerHTML = '';
                channels.forEach(channel => {
                    const div = document.createElement('div');
                    div.className = 'content-item';
                    div.innerHTML = `
                        <img src="${channel.logo}" alt="${channel.name}">
                        <div class="status up">En ligne</div>
                    `;
                    div.onclick = () => {
                        // Logique pour afficher le programme TV
                    };
                    channelsList.appendChild(div);
                });
            } catch (error) {
                channelsList.innerHTML = 'Erreur de chargement des chaînes TV.';
                console.error(error);
            }
        }

        // Chargement initial des films
        loadMovies();
    </script>
</body>
</html>
