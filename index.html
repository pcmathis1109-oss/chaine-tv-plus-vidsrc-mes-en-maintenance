<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Portail IPTV Complet</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #1e293b; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #334155; }
        .btn { display: block; margin-top: 10px; padding: 8px; background: #38bdf8; color: black; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .maint { color: #f59e0b; font-weight: bold; }
        #lecteur-zone { margin-top: 20px; background: #000; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <h1>🌍 Portail IPTV Mondial</h1>

    <script>
        const config = {
            "france": "ON",
            "espagne": "ON",
            "italie": "ON"
        };
    </script>

    <div id="app" class="grid"></div>

    <div id="lecteur-zone" style="display:none;">
        <button onclick="document.getElementById('lecteur-zone').style.display='none'">Fermer Lecteur</button>
        <video id="video" controls style="width:100%;"></video>
    </div>

    <script>
        const app = document.getElementById('app');
        const video = document.getElementById('video');
        let hls;

        const paysList = [
            { id: "france", name: "France", code: "fr" },
            { id: "espagne", name: "Espagne", code: "es" },
            { id: "italie", name: "Italie", code: "it" }
        ];

        function init() {
            paysList.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                if (config[p.id] === "OFF") {
                    card.innerHTML = `<h3>${p.name}</h3><p class="maint">⚠️ En maintenance</p>`;
                } else {
                    card.innerHTML = `<h3>${p.name}</h3><a href="#" class="btn" onclick="lancer('${p.code}')">Accéder</a>`;
                }
                app.appendChild(card);
            });
        }

        function lancer(code) {
            alert("Liste chargée pour : " + code + ". Note : Les flux HTTPS bloqués par les sites ne fonctionneront pas directement dans le navigateur.");
            document.getElementById('lecteur-zone').style.display = 'block';
            // Ici tu peux ajouter la logique de parsing .m3u
        }

        init();
    </script>
</body>
</html>
