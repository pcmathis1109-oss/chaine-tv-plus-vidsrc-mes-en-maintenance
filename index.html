<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Monde - Toutes les chaînes</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            padding: 20px; 
            margin: 0;
        }
        h1 { text-align: center; color: #38bdf8; }
        
        /* Barre de recherche */
        .search-container { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        input[type="text"] { 
            padding: 12px; 
            width: 90%; 
            max-width: 400px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            background: #1e293b;
            color: white;
            outline: 2px solid #334155;
        }
        input[type="text"]:focus { outline: 2px solid #38bdf8; }

        /* Grille des pays */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { 
            background: #1e293b; 
            padding: 20px; 
            border-radius: 10px; 
            text-align: center; 
            border: 1px solid #334155; 
            transition: transform 0.2s; 
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-top: 0; font-size: 1.2rem; }
        
        /* Boutons et statuts */
        .status-msg { color: #f59e0b; font-weight: bold; margin-top: 15px; }
        .btn { 
            display: inline-block; 
            margin-top: 10px; 
            padding: 10px 20px; 
            background: #38bdf8; 
            color: #0f172a; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
        .btn:hover { background: #0ea5e9; }
    </style>
</head>
<body>

    <h1>🌍 IPTV Monde - Toutes les chaînes</h1>

    <!-- ========================================== -->
    <!-- ZONE DE CONFIGURATION DE LA MAINTENANCE    -->
    <!-- ========================================== -->
    <script>
        // "ON" = Disponible | "OFF" = En maintenance
        // Utilise le code officiel du pays (fr, us, es, it, jp, etc.)
        const configMaintenance = {
            "GLOBAL": "ON", // ⚠️ Mets "OFF" ici pour fermer absolument TOUT le site
            "fr": "ON",     // France
            "es": "ON",     // Espagne
            "it": "OFF",    // Italie (exemple de maintenance)
            "us": "ON",     // Etats-Unis
            "gb": "ON"      // Royaume-Uni
        };
    </script>
    <!-- ========================================== -->

    <!-- Barre de recherche -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Rechercher un pays (ex: France, Japan...)" onkeyup="filtrerPays()">
    </div>

    <!-- Conteneur principal -->
    <div id="app" class="grid">Chargement des pays du monde entier...</div>

    <script>
        let tousLesPays = []; // Va stocker la liste de tous les pays

        // 1. Fonction pour récupérer tous les pays depuis l'API
        async function chargerPays() {
            const app = document.getElementById('app');
            try {
                // On récupère la liste complète des pays depuis iptv-org
                const reponse = await fetch('https://iptv-org.github.io/api/countries.json');
                tousLesPays = await reponse.json();

                // On affiche les pays à l'écran
                afficherPays(tousLesPays);
            } catch (e) {
                app.innerHTML = "<h3 style='color:red;'>Erreur : Impossible de charger la base de données de l'API.</h3>";
            }
        }

        // 2. Fonction pour créer les "cartes" à l'écran
        function afficherPays(listePays) {
            const app = document.getElementById('app');
            app.innerHTML = ""; // On vide le message de chargement

            // Vérification de la maintenance GLOBALE
            if (configMaintenance["GLOBAL"] === "OFF") {
                app.innerHTML = "<h2 style='color:#f59e0b; text-align:center; width:100%;'>🚧 Le site complet est actuellement en maintenance. Revenez plus tard ! 🚧</h2>";
                return; // On arrête le code ici
            }

            // On génère une carte pour chaque pays
            listePays.forEach(pays => {
                if (!pays.name) return; // Sécurité : on ignore s'il n'y a pas de nom

                const code = pays.code.toLowerCase();
                const drapeau = pays.flag || "📺"; // Si pas de drapeau, on met une télé
                const card = document.createElement('div');
                card.className = 'card';

                // Le lien officiel vers la liste m3u du pays
                const urlPlaylist = `https://iptv-org.github.io/iptv/countries/${code}.m3u`;

                // Vérification de la maintenance par pays
                if (configMaintenance[code] === "OFF") {
                    card.innerHTML = `
                        <h3>${pays.name} ${drapeau}</h3>
                        <p class="status-msg">⚠️ En maintenance</p>
                    `;
                } else {
                    card.innerHTML = `
                        <h3>${pays.name} ${drapeau}</h3>
                        <a href="${urlPlaylist}" class="btn">Obtenir les chaînes</a>
                    `;
                }
                app.appendChild(card);
            });
        }

        // 3. Fonction pour la barre de recherche
        function filtrerPays() {
            const recherche = document.getElementById('searchInput').value.toLowerCase();
            // On filtre la liste pour ne garder que ceux qui correspondent à la recherche
            const paysFiltres = tousLesPays.filter(pays => 
                pays.name.toLowerCase().includes(recherche)
            );
            afficherPays(paysFiltres); // On réaffiche avec les résultats filtrés
        }

        // Lancement de l'application au démarrage
        chargerPays();
    </script>
</body>
</html>
